name: Release

# Tagging v* triggers a build matrix that uploads platform binaries
# to the matching GitHub Release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGE="granola-${GITHUB_REF_NAME}-${TARGET}"
          mkdir -p "$STAGE"
          cp "target/${TARGET}/release/granola" "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGE="granola-${GITHUB_REF_NAME}-${TARGET}"
          mkdir -p "$STAGE"
          cp "target/${TARGET}/release/granola.exe" "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          7z a "${STAGE}.zip" "$STAGE"
          sha256sum "${STAGE}.zip" > "${STAGE}.zip.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            granola-*.tar.gz
            granola-*.tar.gz.sha256
            granola-*.zip
            granola-*.zip.sha256
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
